global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2000
    stats socket /run/haproxy/haproxy.sock mode 660 level admin expose-fd listeners
    nbthread 2
    hard-stop-after 5m
    daemon

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    retries 3

# Stats (local only)
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

frontend http_frontend
    bind *:80
    mode http
    http-request redirect scheme https code 301

frontend https_frontend
    bind *:443 ssl crt @CERT_DIR@/full.pem alpn h2,http/1.1
    mode http

    http-response set-header Strict-Transport-Security max-age=31536000
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options SAMEORIGIN

    # ACL for allowed networks (172.22.0.0/16, 172.21.0.0/16, 172.23.0.0/16)
    acl allowed_networks src 172.22.0.0/16 172.21.0.0/16 172.23.0.0/16
    acl path_ws path_beg -i /ws
    acl host_nix hdr(host) -i nix.home.REDACTED-DOMAIN.TLD
    acl host_virtualization hdr(host) -i virtualization.home.REDACTED-DOMAIN.TLD
    acl host_wall hdr(host) -i wall.home.REDACTED-DOMAIN.TLD
    acl host_cacher hdr(host) -i cacher.home.REDACTED-DOMAIN.TLD

    # Deny nix endpoint if not from allowed networks
    http-request deny status 403 if host_nix !allowed_networks

    # /ws endpoint - route based on path only
    use_backend be_wstunnel if path_ws
    # Host-based backends
    use_backend be_nix if host_nix allowed_networks
    use_backend be_virtualization if host_virtualization allowed_networks
    use_backend be_wall if host_wall allowed_networks
    use_backend be_cacher if host_cacher allowed_networks

    # Default backend for all other requests
    default_backend be_default

backend be_wstunnel
    mode http
    no option http-server-close
    no option httpclose
    http-request set-header Upgrade websocket if !{ req.hdr(Upgrade) -m found }
    http-request set-header Connection upgrade if !{ req.hdr(Connection) -m found }
    timeout tunnel 12h
    server ws 172.21.1.102:8080

backend be_nix
    mode http
    server nixcache 172.21.1.101:5000 check

backend be_virtualization
    mode http
    server proxmox 172.21.0.10:8006 ssl verify none

backend be_wall
    mode http
    server pfsense 172.21.1.1:8443 ssl verify none

backend be_cacher
    mode http
    server apt-cacher 172.21.1.10:3142 check inter 1000

backend be_default
    mode http
    errorfile 503 /run/haproxy/default.http
