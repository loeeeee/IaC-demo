global
	maxconn			10000
	stats socket /run/haproxy/haproxy.sock mode 660 level admin expose-fd listeners
	nbthread			2
	hard-stop-after		15m
	daemon
	ssl-default-bind-ciphersuites	TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
	ssl-default-server-ciphersuites	TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
	ssl-default-bind-options	ssl-min-ver TLSv1.3 no-tls-tickets
	ssl-default-server-options	ssl-min-ver TLSv1.3 no-tls-tickets
	tune.ssl.default-dh-param	2048
	server-state-file /var/lib/haproxy/server_state
	tune.lua.bool-sample-conversion normal
	# Lua modules for Authelia forward-auth integration
	# Set Lua path to include json module
	lua-prepend-path @LUA_PATH@/?/http.lua
	lua-prepend-path @LUA_PATH@/?.lua
	lua-load @LUA_PATH@/auth-request.lua

defaults
	mode			http
	log			global
	option			http-server-close
	option			forwardfor
	timeout connect		30000
	timeout client		30000
	timeout server		30000
	retries			3
	load-server-state-from-file	global

listen HAProxyLocalStats
	bind 127.0.0.1:2200 name localstats
	stats enable
	stats admin if TRUE
	stats show-legends
	stats uri /haproxy/haproxy_stats.php?haproxystats=1
	timeout client 5000
	timeout connect 5000
	timeout server 5000

frontend SharedFrontEnd
	bind			172.21.1.103:443 ssl crt @CERT_DIR@/full.pem alpn h2,http/1.1  
	acl https ssl_fc
	http-request set-header		X-Forwarded-Proto http if !https
	http-request set-header		X-Forwarded-Proto https if https
	acl			protected-frontends	hdr(host) -m reg -i ^(?i)(cacher|code|downloader|yuyan)\.home\.f5\.monster
	acl			authelia	hdr(Host) -i auth.home.REDACTED-DOMAIN.TLD
	acl			mercury	hdr(Host) -i cacher.home.REDACTED-DOMAIN.TLD
	acl			cancer	hdr(Host) -i media.home.REDACTED-DOMAIN.TLD
	acl			oak	hdr(Host) -i virtualization.home.REDACTED-DOMAIN.TLD
	acl			taurus	hdr(Host) -i storage.home.REDACTED-DOMAIN.TLD
	acl			aries	hdr(Host) -i wall.home.REDACTED-DOMAIN.TLD
	acl			pisces	hdr(Host) -i speedtest.home.REDACTED-DOMAIN.TLD
	acl			saturn	hdr(Host) -i downloader.home.REDACTED-DOMAIN.TLD
	acl			bedrock	hdr(Host) -i bedrock.home.REDACTED-DOMAIN.TLD
	acl			alpine	hdr(Host) -i ldap.home.REDACTED-DOMAIN.TLD
	acl			colusa	hdr(Host) -i photos.home.REDACTED-DOMAIN.TLD
	acl			mars	hdr(Host) -i share.home.REDACTED-DOMAIN.TLD
	acl			calaveras	hdr(Host) -i code.home.REDACTED-DOMAIN.TLD
	acl			uranus	hdr(Host) -i pypi.home.REDACTED-DOMAIN.TLD
	acl			aquarius	hdr(Host) -i yuyan.home.REDACTED-DOMAIN.TLD
	acl			oak-ipmi	hdr(Host) -i oak-ipmi.home.REDACTED-DOMAIN.TLD
	acl			contraCosta-immich	hdr(Host) -i immich-uc.home.REDACTED-DOMAIN.TLD
	acl			delNorte-immich	hdr(Host) -i immich-ug.home.REDACTED-DOMAIN.TLD
	acl			elDorado-immich	hdr(Host) -i immich-dg.home.REDACTED-DOMAIN.TLD
	acl			libra	hdr(Host) -i npm.home.REDACTED-DOMAIN.TLD
	acl			scorpio	hdr(Host) -i photos-new.home.REDACTED-DOMAIN.TLD
	acl			sapporo	hdr(Host) -i nix.home.REDACTED-DOMAIN.TLD
	acl			aclcrt_SharedFrontEnd	var(txn.txnhost) -m reg -i ^([^\.]*)\.home\.f5\.monster(:([0-9]){1,5})?$
	http-request set-var(txn.txnhost) hdr(host)
	http-request set-var(req.scheme) str(https)  if  { ssl_fc } aclcrt_SharedFrontEnd
	http-request set-var(req.scheme) str(http)  if  !{ ssl_fc } aclcrt_SharedFrontEnd
	http-request set-var(req.questionmark) str(?)  if  { query -m found } aclcrt_SharedFrontEnd
	http-request set-header X-Forwarded-Method %[var(req.method)]  if  protected-frontends aclcrt_SharedFrontEnd
	http-request set-header X-Forwarded-Proto %[var(req.scheme)]  if  protected-frontends aclcrt_SharedFrontEnd
	http-request set-header X-Forwarded-Host %[req.hdr(Host)]  if  protected-frontends aclcrt_SharedFrontEnd
	http-request set-header X-Forwarded-URI %[path]%[var(req.questionmark)]%[query]  if  protected-frontends aclcrt_SharedFrontEnd
	http-request set-header X-Real-IP %[src]  if  protected-frontends aclcrt_SharedFrontEnd
	http-request lua.auth-intercept be_authelia /api/authz/forward-auth HEAD * remote-user,remote-groups,remote-name,remote-email - if protected-frontends
	http-request deny if protected-frontends !{ var(txn.auth_response_successful) -m bool } { var(txn.auth_response_code) -m int 403 }
	http-request redirect location %[var(txn.auth_response_location)] if protected-frontends !{ var(txn.auth_response_successful) -m bool }
	use_backend alameda-authelia_ipvANY  if  authelia aclcrt_SharedFrontEnd
	use_backend mercury-apt_cacher_ipvANY  if  mercury aclcrt_SharedFrontEnd
	use_backend cancer-jellyfin_ipvANY  if  cancer aclcrt_SharedFrontEnd
	use_backend oak-proxmox_ve_ipvANY  if  oak aclcrt_SharedFrontEnd
	use_backend taurus-truenas_ipvANY  if  taurus aclcrt_SharedFrontEnd
	use_backend aries-pfsense_ipvANY  if  aries aclcrt_SharedFrontEnd
	use_backend pisces-librespeed_ipvANY  if  pisces aclcrt_SharedFrontEnd
	use_backend saturn-qbittorrent_ipvANY  if  saturn aclcrt_SharedFrontEnd
	use_backend bedrock-truenas_ipvANY  if  bedrock aclcrt_SharedFrontEnd
	use_backend alpine-lldap_ipvANY  if  alpine aclcrt_SharedFrontEnd
	use_backend mars-dufs_ipvANY  if  mars aclcrt_SharedFrontEnd
	use_backend calaveras-code_server_ipvANY  if  calaveras aclcrt_SharedFrontEnd
	use_backend uranus-devpi_ipvANY  if  uranus aclcrt_SharedFrontEnd
	use_backend aquarius-code_server-swift_ipvANY  if  aquarius aclcrt_SharedFrontEnd
	use_backend oak-IPMI_ipvANY  if  oak-ipmi aclcrt_SharedFrontEnd
	use_backend colusa-immich_ipvANY  if  colusa aclcrt_SharedFrontEnd
	use_backend contraCosta-immich_Ubuntu_CPU_ipvANY  if  contraCosta-immich aclcrt_SharedFrontEnd
	use_backend delNorte-immich_Ubuntu_GPU_ipvANY  if  delNorte-immich aclcrt_SharedFrontEnd
	use_backend elDorado-immich_Debian_GPU_ipvANY  if  elDorado-immich aclcrt_SharedFrontEnd
	use_backend libra-Verdaccio_ipvANY  if  libra aclcrt_SharedFrontEnd
	use_backend scorpio-immich_ipvANY  if  scorpio aclcrt_SharedFrontEnd
	use_backend DMZ-NixCache_ipvANY  if  sapporo aclcrt_SharedFrontEnd
	default_backend be_default

backend alameda-authelia_ipvANY
	id			131
	acl			remote_user_exist	var(req.auth_response_header.remote_user) -m found
	acl			remote_groups_exist	var(req.auth_response_header.remote_groups) -m found
	acl			remote_name_exist	var(req.auth_response_header.remote_name) -m found
	acl			remote_email_exist	var(req.auth_response_header.remote_email) -m found
	http-request set-header Remote-User %[var(req.auth_response_header.remote_user)]  if  remote_user_exist 
	http-request set-header Remote-Groups %[var(req.auth_response_header.remote_groups)]  if  remote_groups_exist 
	http-request set-header Remote-Name %[var(req.auth_response_header.remote_name)]  if  remote_name_exist 
	http-request set-header Remote-Email %[var(req.auth_response_header.remote_email)]  if  remote_email_exist 
	server			alameda 172.21.0.41:9091 id 132  

