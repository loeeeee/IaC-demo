global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2000
    stats socket /run/haproxy/haproxy.sock mode 660 level admin expose-fd listeners
    nbthread 2
    hard-stop-after 5m
    daemon

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    retries 3

# Stats (local only)
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

frontend http_frontend
    bind *:80
    mode http
    http-request redirect scheme https code 301

frontend https_frontend
    bind *:443 ssl crt @CERT_DIR@/full.pem alpn h2,http/1.1
    mode http

    http-response set-header Strict-Transport-Security max-age=31536000
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options SAMEORIGIN
    http-request set-header X-Forwarded-Proto https

    # ACL for allowed networks (172.22.0.0/16, 172.21.0.0/16, 172.23.0.0/16)
    acl allowed_networks src 172.22.0.0/16 172.21.0.0/16 172.23.0.0/16 127.0.0.1/8 REDACTED
    acl path_ws path_beg -i /ws
    acl host_ws hdr(host) -i @DOMAIN@
    acl host_nix hdr(host) -i nix.@DOMAIN@
    acl host_gatus hdr(host) -i status.@DOMAIN@
    acl host_librespeed hdr(host) -i speed.@DOMAIN@

    # Deny endpoint if not from allowed networks
    http-request deny status 403 if host_nix !allowed_networks
    http-request deny status 403 if host_gatus !allowed_networks
    http-request deny status 403 if host_librespeed !allowed_networks

    # /ws endpoint - route based on path only
    use_backend be_wstunnel if path_ws
    # endpoint - restricted to allowed networks only
    use_backend be_nix if host_nix allowed_networks
    use_backend be_gatus if host_gatus allowed_networks
    use_backend be_librespeed if host_librespeed allowed_networks

    # Default backend for all other requests
    default_backend be_default

backend be_wstunnel
    mode http
    no option http-server-close
    no option httpclose
    http-request set-header Upgrade websocket if !{ req.hdr(Upgrade) -m found }
    http-request set-header Connection upgrade if !{ req.hdr(Connection) -m found }
    timeout tunnel 12h
    server ws 127.0.0.1:8443

backend be_nix
    mode http
    server nixcache 127.0.0.1:5000 check

backend be_gatus
    mode http
    server gatus 127.0.0.1:5001 check

backend be_librespeed
    mode http
    server librespeed 127.0.0.1:5002 check

backend be_default
    mode http
    errorfile 503 /run/haproxy/default.http
