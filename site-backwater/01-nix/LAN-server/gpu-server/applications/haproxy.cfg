global
    maxconn 10000
    stats socket /run/haproxy/haproxy.sock mode 660 level admin expose-fd listeners
    nbthread 2
    hard-stop-after 15m
    daemon

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    timeout tunnel 1h
    retries 3

# Stats interface (local only)
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# Frontend listening on port 8080
frontend http_frontend
    bind *:8080
    mode http

    # Set X-Forwarded headers
    http-request set-header X-Forwarded-Proto http

    # Route to Sunshine backend
    default_backend be_sunshine

# Backend forwarding to Sunshine on port 47990 (HTTPS)
backend be_sunshine
    mode http
    option http-server-close
    timeout tunnel 1h
    server sunshine 127.0.0.1:47990 ssl verify none check

