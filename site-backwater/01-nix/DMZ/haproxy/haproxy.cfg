global
    maxconn 10000
    stats socket /run/haproxy/haproxy.sock mode 660 level admin expose-fd listeners
    nbthread 2
    hard-stop-after 15m
    daemon
    # Lua modules for Authelia forward-auth integration
    # Set Lua path to include json module
    lua-prepend-path @LUA_PATH@/?/http.lua
    lua-prepend-path @LUA_PATH@/?.lua
    lua-load @LUA_PATH@/auth-request.lua

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor
    timeout connect 10s   # Fast fail if server is down
    timeout client 60s
    timeout server 60s
    retries 3

# Stats interface (local only)
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# Prometheus metrics endpoint
frontend prometheus
    bind *:9167
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    no log

# Main HTTPS frontend
frontend https_frontend
    bind *:443 ssl crt @CERT_DIR@/full.pem alpn h2,http/1.1
    mode http

    # HSTS (Strict-Transport-Security)
    # Tells browsers to ONLY use HTTPS for the next year.
    http-response set-header Strict-Transport-Security max-age=31536000

    # Hide backend software versions
    http-response set-header X-Content-Type-Options nosniff

    # Set X-Forwarded headers
    acl https ssl_fc
    http-request set-header X-Forwarded-Proto http if !https
    http-request set-header X-Forwarded-Proto https if https

    # Host-based ACLs
    acl host_code_backup hdr(host) -i code-backup.@DOMAIN@
    acl host_proxmox hdr(host) -i virtualization.@DOMAIN@
    acl host_pfsense hdr(host) -i wall.@DOMAIN@
    acl host_jellyfin hdr(host) -i media.@DOMAIN@
    acl host_qbittorrent hdr(host) -i downloader.@DOMAIN@
    acl host_code hdr(host) -i code.@DOMAIN@
    acl host_nixcache hdr(host) -i nix.@DOMAIN@
    acl host_grafana hdr(host) -i grafana.@DOMAIN@
    acl host_prometheus hdr(host) -i prometheus.@DOMAIN@
    acl host_base hdr(host) -i @DOMAIN@
    acl host_librespeed hdr(host) -i speed.@DOMAIN@
    acl host_lldap hdr(host) -i lldap.@DOMAIN@
    acl host_authelia hdr(host) -i auth.@DOMAIN@
    acl host_photos hdr(host) -i photos.@DOMAIN@
    acl host_sunshine hdr(host) -i sunshine.@DOMAIN@
    acl host_spark hdr(host) -i spark.@DOMAIN@
    acl host_status hdr(host) -i status.@DOMAIN@
    acl host_searxng hdr(host) -i search.@DOMAIN@
    acl host_claw hdr(host) -i claw.@DOMAIN@
    acl host_openai hdr(host) -i openai.@DOMAIN@
    acl host_matrix hdr(host) -i matrix.@DOMAIN@

    # Path-based ACLs
    acl path_share path_beg -i /share
    acl path_ws path_beg -i /ws

    # Source-based ACL for internal networks
    acl src_internal src 172.22.0.0/16

    # Variables for Authelia forward-auth (used when protection is enabled)
    http-request set-var(req.scheme) str(https) if { ssl_fc }
    http-request set-var(req.scheme) str(http) if !{ ssl_fc }
    http-request set-var(req.questionmark) str(?) if { query -m found }

    # Required headers for Authelia forward-auth
    http-request set-header X-Forwarded-Method %[method]
    http-request set-header X-Forwarded-Proto %[var(req.scheme)]
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]
    http-request set-header X-Forwarded-URI %[path]%[var(req.questionmark)]%[query]

    # Authelia forward-auth
    # Protect selected frontends with Authelia (includes WebSocket support)
    acl protected-frontends hdr(Host) -m reg -i ^(?i)(code|prometheus|downloader|status|claw)\.@DOMAIN@
    http-request lua.auth-intercept be_authelia /api/authz/forward-auth HEAD * remote-user,remote-groups,remote-name,remote-email - if protected-frontends
    http-request deny if protected-frontends !{ var(txn.auth_response_successful) -m bool } { var(txn.auth_response_code) -m int 403 }
    http-request redirect location %[var(txn.auth_response_location)] if protected-frontends !{ var(txn.auth_response_successful) -m bool }

    # Backend routing rules
    # Internal-only services (require src_internal)
    use_backend be_code_backup if host_code_backup src_internal
    use_backend be_proxmox if host_proxmox src_internal
    use_backend be_pfsense if host_pfsense src_internal
    use_backend be_jellyfin if host_jellyfin src_internal
    use_backend be_qbittorrent if host_qbittorrent src_internal
    use_backend be_code if host_code src_internal
    use_backend be_nixcache if host_nixcache src_internal
    use_backend be_grafana if host_grafana src_internal
    use_backend be_prometheus if host_prometheus src_internal
    use_backend be_librespeed if host_librespeed src_internal
    use_backend be_lldap if host_lldap src_internal
    use_backend be_authelia if host_authelia
    use_backend be_photos if host_photos src_internal
    use_backend be_sunshine if host_sunshine src_internal
    use_backend be_spark if host_spark
    use_backend be_gatus if host_status src_internal
    use_backend be_searxng if host_searxng src_internal
    use_backend be_claw if host_claw src_internal
    use_backend be_openai if host_openai src_internal
    use_backend be_matrix if host_matrix src_internal

    # Public services (path-based on base domain)
    use_backend be_dufs if host_base path_share
    # /ws endpoint - route based on path only
    use_backend be_wstunnel if path_ws

    # Default backend for all other requests
    default_backend be_default

# HTTP frontend for ACME challenge and redirect
frontend http_frontend
    bind *:80
    mode http

    # ACME HTTP-01 challenge (if needed as fallback)
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend be_acme if is_acme

    # Redirect all other HTTP to HTTPS
    http-request redirect scheme https unless is_acme

# ACME challenge backend (not typically used with DNS-01)
backend be_acme
    mode http
    server acme 127.0.0.1:8080

# LAN-server backends (172.22.0.x)
backend be_code_backup
    mode http
    option http-server-close
    timeout tunnel 1h    # Keep WebSocket open
    server rigel 172.22.0.105:8080 check

backend be_proxmox
    mode http
    server deepslate 192.168.0.2:8006 ssl verify none check

backend be_jellyfin
    mode http
    option http-server-close
    timeout tunnel 1h    # Keep WebSocket open
    server alnitak 172.22.0.132:8080 check

backend be_code
    mode http
    option http-server-close
    timeout tunnel 1h    # Keep WebSocket open
    server alnilam 172.22.0.130:8080 check

backend be_grafana
    mode http
    server aldebaran 172.22.0.113:8080 check

backend be_prometheus
    mode http
    option http-server-close
    timeout tunnel 1h    # Keep WebSocket open
    server spica 172.22.0.112:8080 check

backend be_lldap
    mode http
    server arcturus 172.22.0.115:8080 check

backend be_authelia
    mode http
    server antares 172.22.0.116:8080 check

backend be_gatus
    mode http
    server pollux 172.22.0.117:8080 check

# DMZ backends (172.22.100.x)
backend be_pfsense
    mode http
    server sirius 172.22.100.1:8443 ssl verify none check

backend be_dufs
    mode http
    server contracosta 172.22.100.107:8080 check send-proxy-v2

backend be_wstunnel
    mode http
    no option http-server-close
    no option httpclose
    http-request set-header Upgrade websocket if !{ req.hdr(Upgrade) -m found }
    http-request set-header Connection upgrade if !{ req.hdr(Connection) -m found }
    timeout tunnel 12h
    server delnorte 172.22.100.108:8080

backend be_qbittorrent
    mode http
    server colusa 172.22.100.106:8080 check

backend be_nixcache
    mode http
    server calaveras 172.22.100.105:8080 check

backend be_librespeed
    mode http
    server eldorado 172.22.100.109:8080 check

backend be_searxng
    mode http
    server inyo 172.22.100.114:8080 check

backend be_claw
    mode http
    server kern 172.22.100.115:8080 check

backend be_matrix
    mode http
    server lake 172.22.100.117:8080 check

backend be_photos
    mode http
    option http-server-close
    timeout tunnel 1h
    server alioth 172.22.0.131:8080 check

backend be_sunshine
    mode http
    option http-server-close
    timeout tunnel 1h
    server canopus 172.22.0.134:8080 check

backend be_openai
    mode http
    server kings 172.22.100.116:8080 check

backend be_spark
    mode http
    option http-server-close
    timeout connect 10s
    timeout server 300s
    timeout client 300s
    timeout tunnel 1h
    server mizar 172.22.0.136:8080 check

# TCP frontend for Minecraft server
frontend minecraft_frontend
    bind *:25565
    mode tcp
    option tcplog
    default_backend be_minecraft

# Minecraft server backend (TCP mode)
backend be_minecraft
    mode tcp
    option tcplog
    timeout connect 10s
    timeout server 60s
    timeout client 60s
    server lassen 172.22.100.118:25565 check

backend be_default
    mode http
    errorfile 503 /run/haproxy/default.http